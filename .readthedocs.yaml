# Configuration de build pour Read the Docs
# Référence: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
    # Build PDF format:
formats:
  - pdf

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/conf.py
